<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Expense Management</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.7/dist/css/bootstrap.min.css" rel="stylesheet">

    <link rel="stylesheet" th:href="@{/css/dashboard.css}">
    <link rel="stylesheet" th:href="@{/css/expense.css}">

    <link rel="stylesheet"
          href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">
</head>

<body>

<div class="dashboard-container">

    <!-- Sidebar -->
    <div th:replace="~{fragments/sidebar :: sidebar}"></div>

    <div class="main-content">

        <!-- Navbar -->
        <div th:replace="~{fragments/navbar :: navbar}"></div>

        <div class="content">

            <!-- Page Header -->
            <div class="d-flex justify-content-between align-items-center mb-4">

                <div>
                    <h2 class="fw-bold">Expense Management</h2>
                    <p class="text-muted mb-0">
                        Manage all your expenses in one place.
                    </p>
                </div>

                <a th:href="@{/expense/add}" class="btn btn-primary">
                    <i class="bi bi-plus-circle"></i>
                    Add Expense
                </a>

            </div>

            <!-- Success Messages -->

            <div th:if="${param.success=='added'}"
                 class="alert alert-success alert-dismissible fade show"
                 role="alert">

                <i class="bi bi-check-circle-fill"></i>
                Expense added successfully.

                <button type="button"
                        class="btn-close"
                        data-bs-dismiss="alert">
                </button>

            </div>

            <div th:if="${param.success=='updated'}"
                 class="alert alert-warning alert-dismissible fade show"
                 role="alert">

                <i class="bi bi-pencil-square"></i>
                Expense updated successfully.

                <button type="button"
                        class="btn-close"
                        data-bs-dismiss="alert">
                </button>

            </div>

            <div th:if="${param.success=='deleted'}"
                 class="alert alert-danger alert-dismissible fade show"
                 role="alert">

                <i class="bi bi-trash-fill"></i>
                Expense deleted successfully.

                <button type="button"
                        class="btn-close"
                        data-bs-dismiss="alert">
                </button>

            </div>

            <!-- Search -->

            <div class="card shadow-sm border-0 mb-4">

                <div class="card-body">

                    <form th:action="@{/expense}" method="get">

                        <div class="row g-2">

                            <div class="col-md-8">

                                <input
                                        type="text"
                                        name="keyword"
                                        class="form-control"
                                        placeholder="Search by Title, Category or Description..."
                                        th:value="${keyword}">

                            </div>

                            <div class="col-md-2 d-grid">

                                <button class="btn btn-primary" type="submit">

                                    <i class="bi bi-search"></i>

                                    Search

                                </button>

                            </div>

                            <div class="col-md-2 d-grid">

                                <a th:href="@{/expense}"
                                   class="btn btn-outline-secondary">

                                    <i class="bi bi-arrow-clockwise"></i>

                                    Clear

                                </a>

                            </div>

                        </div>

                    </form>

                </div>

            </div>

            <!-- Expense Table -->

            <div class="card shadow-sm border-0">

                <div class="card-header bg-white">

                    <h5 class="mb-0 fw-bold">
                        Expense List
                    </h5>

                </div>

                <div class="card-body">

                    <div class="table-responsive">

                        <table class="table table-hover align-middle">

                            <thead class="table-dark">

                            <tr>
                                <th>ID</th>
                                <th>Title</th>
                                <th>Category</th>
                                <th>Amount</th>
                                <th>Date</th>
                                <th>Actions</th>
                            </tr>

                            </thead>

                            <tbody>

                            <tr th:each="expense : ${expenseList}">

                                <td th:text="${expense.id}"></td>

                                <td th:text="${expense.title}"></td>

                                <td th:text="${expense.category}"></td>

                                <td th:text="'₹' + ${expense.amount}"></td>

                                <td th:text="${expense.date}"></td>

                                <td>
                                                                    <a th:href="@{/expense/view/{id}(id=${expense.id})}"
                                       class="btn btn-info btn-sm me-1">

                                        <i class="bi bi-eye"></i>

                                    </a>

                                    <a th:href="@{/expense/edit/{id}(id=${expense.id})}"
                                       class="btn btn-warning btn-sm me-1">

                                        <i class="bi bi-pencil-square"></i>

                                    </a>

                                    <a th:href="@{/expense/delete/{id}(id=${expense.id})}"
                                       class="btn btn-danger btn-sm"
                                       onclick="return confirm('Are you sure you want to delete this expense?');">

                                        <i class="bi bi-trash"></i>

                                    </a>

                                </td>

                            </tr>

                            <!-- No Records Found -->

                            <tr th:if="${#lists.isEmpty(expenseList)}">

                                <td colspan="6" class="text-center text-muted py-4">

                                    <i class="bi bi-inbox fs-3 d-block mb-2"></i>

                                    No expense records found.

                                </td>

                            </tr>

                            </tbody>

                        </table>

                    </div>

                </div>

            </div>

        </div>

    </div>

</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.7/dist/js/bootstrap.bundle.min.js"></script>

<script>

    // Auto-hide success alerts after 3 seconds
    setTimeout(function () {

        const alerts = document.querySelectorAll(".alert");

        alerts.forEach(function (alert) {

            const bsAlert = bootstrap.Alert.getOrCreateInstance(alert);

            bsAlert.close();

        });

    }, 3000);

</script>

</body>

</html>
