<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">

<head>

    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title>Dashboard | Smart Expense Tracker</title>

    <!-- Bootstrap CSS -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.7/dist/css/bootstrap.min.css"
          rel="stylesheet">

    <!-- Bootstrap Icons -->
    <link rel="stylesheet"
          href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.13.1/font/bootstrap-icons.min.css">

    <!-- Dashboard CSS -->
    <link rel="stylesheet" th:href="@{/css/dashboard.css}">

</head>

<body>

<div class="dashboard-container">

    <!-- Sidebar -->
    <div th:replace="~{fragments/sidebar :: sidebar}"></div>

    <!-- Main Content -->
    <div class="main-content">

        <!-- Navbar -->
        <div th:replace="~{fragments/navbar :: navbar}"></div>

        <div class="content">

            <!-- Welcome -->
            <div class="welcome-section">

                <h2>👋 Welcome Back</h2>

                <p>
                    Manage your finances smarter with AI-powered insights.
                </p>

            </div>

            <!-- Summary Cards -->
            <div th:replace="~{fragments/summary-cards :: summaryCards}"></div>
            
            <!-- Charts -->
            <div th:replace="~{fragments/charts :: charts}"></div>
            
            <div class="col-lg-6 mb-4">

    <div class="dashboard-card">

        <div class="card-body">

            <h5 class="fw-bold mb-3">
                Budget Usage
            </h5>

            <div class="progress mb-3" style="height:25px;">

                <div class="progress-bar"

                     role="progressbar"

                     th:style="'width:' + ${budgetUsage} + '%;'"

                     th:text="${#numbers.formatDecimal(budgetUsage,1,0)} + '%'">

                </div>

            </div>

            <h6>

                Status :

                <span class="badge"

                      th:classappend="${budgetStatus=='On Track'} ? ' bg-success'
                                   : (${budgetStatus=='Near Limit'} ? ' bg-warning'
                                   : ' bg-danger')"

                      th:text="${budgetStatus}">

                </span>

            </h6>

        </div>

    </div>

</div>

<div class="col-md-4 mb-4">

    <div class="dashboard-card">

        <div class="card-body">

            <h6 class="text-muted">Current Budget</h6>

            <h3 class="fw-bold text-primary">
                ₹<span th:text="${#numbers.formatDecimal(currentBudget,1,2)}"></span>
            </h3>

        </div>

    </div>

</div>

<div class="col-md-4 mb-4">

    <div class="dashboard-card">

        <div class="card-body">

            <h6 class="text-muted">Remaining Budget</h6>

            <h3 class="fw-bold"
                th:classappend="${remainingBudget >= 0} ? ' text-success' : ' text-danger'">

                ₹<span th:text="${#numbers.formatDecimal(remainingBudget,1,2)}"></span>

            </h3>

        </div>

    </div>

</div>



            <!-- Recent Transactions -->
            <div th:replace="~{fragments/recent-transactions :: recentTransactions}"></div>

            <!-- AI Insights -->
            <div th:replace="~{fragments/ai-insights :: aiInsights}"></div>

        </div>

    </div>

</div>





<!-- Bootstrap JS -->
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.7/dist/js/bootstrap.bundle.min.js"></script>

<!-- Chart.js -->
<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

<script th:inline="javascript">

    /* ---------- Income vs Expense ---------- */

    const incomeChartData = /*[[${incomeChart}]]*/ {};
    const expenseChartData = /*[[${expenseChart}]]*/ {};
    const categoryChartData = /*[[${categoryChart}]]*/ {};

    const incomeExpenseCtx = document.getElementById("incomeExpenseChart");

    if (incomeExpenseCtx) {

        new Chart(incomeExpenseCtx, {

            type: "bar",

            data: {

                labels: Object.keys(incomeChartData),

                datasets: [

                    {
                        label: "Income",
                        data: Object.values(incomeChartData),
                        backgroundColor: "#22c55e",
                        borderRadius: 8
                    },

                    {
                        label: "Expense",
                        data: Object.values(expenseChartData),
                        backgroundColor: "#ef4444",
                        borderRadius: 8
                    }

                ]

            },

            options: {

                responsive: true,

                maintainAspectRatio: false,

                plugins: {

                    legend: {

                        position: "top"

                    }

                }

            }

        });

    }

    /* ---------- Expense Category ---------- */

    const expenseCategoryCtx = document.getElementById("expenseCategoryChart");

    if (expenseCategoryCtx) {

        new Chart(expenseCategoryCtx, {

            type: "doughnut",

            data: {

                labels: Object.keys(categoryChartData),

                datasets: [

                    {

                        data: Object.values(categoryChartData),

                        backgroundColor: [

                            "#3b82f6",
                            "#8b5cf6",
                            "#10b981",
                            "#f59e0b",
                            "#ef4444",
                            "#06b6d4",
                            "#84cc16",
                            "#f97316"

                        ]

                    }

                ]

            },

            options: {

                responsive: true,

                maintainAspectRatio: false,

                plugins: {

                    legend: {

                        position: "bottom"

                    }

                }

            }

        });

    }

</script>
</body>

</html>
