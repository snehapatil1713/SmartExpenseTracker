<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">

<head>

    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title>Income Details | Smart Expense Tracker</title>

    <!-- Bootstrap CSS -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.7/dist/css/bootstrap.min.css"
          rel="stylesheet">

    <!-- Bootstrap Icons -->
    <link rel="stylesheet"
          href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.13.1/font/bootstrap-icons.min.css">

    <!-- Dashboard CSS -->
    <link rel="stylesheet" th:href="@{/css/dashboard.css}">

    <!-- Income CSS -->
    <link rel="stylesheet" th:href="@{/css/income.css}">

</head>

<body>

<div class="dashboard-container">

    <!-- Sidebar -->
    <div th:replace="~{fragments/sidebar :: sidebar}"></div>

    <!-- Main Content -->
    <div class="main-content">

        <!-- Navbar -->
        <div th:replace="~{fragments/navbar :: navbar}"></div>

        <!-- Content -->
        <div class="content">

            <!-- Page Header -->
            <div class="d-flex justify-content-between align-items-center mb-4">

                <div>

                    <h2 class="fw-bold">
                        Income Details
                    </h2>

                    <p class="text-muted mb-0">
                        View complete information about this income.
                    </p>

                </div>

            </div>

            <!-- Details Card -->
            <div class="dashboard-card">

                <div class="card-body">

                    <div class="row g-4">

                        <div class="col-md-6">

                            <label class="fw-bold text-secondary">
                                Income Title
                            </label>

                            <p class="fs-5 mt-2"
                               th:text="${income.title}">
                            </p>

                        </div>

                        <div class="col-md-6">

                            <label class="fw-bold text-secondary">
                                Source
                            </label>

                            <p class="mt-2">

                                <span class="badge bg-primary fs-6 px-3 py-2"
                                      th:text="${income.source}">
                                </span>

                            </p>

                        </div>

                        <div class="col-md-6">

                            <label class="fw-bold text-secondary">
                                Amount
                            </label>

                            <p class="fs-4 fw-bold text-success mt-2">

                                ₹ <span th:text="${income.amount}"></span>

                            </p>

                        </div>

                        <div class="col-md-6">

                            <label class="fw-bold text-secondary">
                                Date
                            </label>

                            <p class="fs-5 mt-2"
                               th:text="${#temporals.format(income.date,'dd MMM yyyy')}">
                            </p>

                        </div>

                        <div class="col-12">

                            <label class="fw-bold text-secondary">
                                Description
                            </label>

                            <div class="border rounded-3 p-3 mt-2 bg-light">

                                <span th:text="${income.description}">
                                </span>

                            </div>

                        </div>
                                            </div>

                    <!-- Action Buttons -->
                    <div class="d-flex justify-content-end gap-2 mt-4">

                        <!-- Back -->
                        <a th:href="@{/income}"
                           class="btn btn-secondary">

                            <i class="bi bi-arrow-left-circle"></i>
                            Back

                        </a>

                        <!-- Edit -->
                        <a th:href="@{'/income/edit/' + ${income.id}}"
                           class="btn btn-warning">

                            <i class="bi bi-pencil-square"></i>
                            Edit

                        </a>

                    </div>

                </div>

            </div>

        </div>

    </div>

</div>

<!-- Bootstrap JS -->
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.7/dist/js/bootstrap.bundle.min.js"></script>

</body>

</html>
