<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">

<head>

    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title>Budget Management | Smart Expense Tracker</title>

    <!-- Bootstrap CSS -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.7/dist/css/bootstrap.min.css"
          rel="stylesheet">

    <!-- Bootstrap Icons -->
    <link rel="stylesheet"
          href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.13.1/font/bootstrap-icons.min.css">

    <!-- Dashboard CSS -->
    <link rel="stylesheet" th:href="@{/css/dashboard.css}">

</head>

<body>

<div class="dashboard-container">

    <!-- Sidebar -->
    <div th:replace="~{fragments/sidebar :: sidebar}"></div>

    <!-- Main Content -->
    <div class="main-content">

        <!-- Navbar -->
        <div th:replace="~{fragments/navbar :: navbar}"></div>

        <div class="content">

            <!-- Header -->
            <div class="d-flex justify-content-between align-items-center mb-4">

                <div>

                    <h2 class="fw-bold">
                        Budget Management
                    </h2>

                    <p class="text-muted mb-0">
                        Manage your monthly budgets.
                    </p>

                </div>

                <a th:href="@{/budget/add}" class="btn btn-primary">

                    <i class="bi bi-plus-circle"></i>

                    Add Budget

                </a>

            </div>

            <!-- Success Messages -->

            <div th:if="${param.success=='added'}"
                 class="alert alert-success">

                Budget added successfully.

            </div>
            
            <div th:if="${param.success=='updated'}"
			     class="alert alert-warning alert-dismissible fade show"
			     role="alert">
			
			    <i class="bi bi-pencil-square"></i>
			
			    Budget updated successfully.
			
			    <button type="button"
			            class="btn-close"
			            data-bs-dismiss="alert">
			    </button>
			
			</div>

            <div th:if="${param.success=='deleted'}"
                 class="alert alert-danger">

                Budget deleted successfully.

            </div>

            <!-- Budget Table -->

            <div class="dashboard-card">

                <div class="card-header bg-white">

                    <h5 class="mb-0 fw-bold">
                        Budget List
                    </h5>

                </div>

                <div class="card-body">

                    <div class="table-responsive">

                        <table class="table table-hover align-middle">

                            <thead class="table-dark">

                            <tr>

                                <th>#</th>
                                <th>Title</th>
                                <th>Month</th>
                                <th>Year</th>
                                <th>Budget</th>
                                <th>Actions</th>

                            </tr>

                            </thead>

                            <tbody>

                            <tr th:if="${#lists.isEmpty(budgetList)}">

                                <td colspan="6"
                                    class="text-center py-5">

                                    No budgets found.

                                </td>

                            </tr>

                            <tr th:each="budget, stat : ${budgetList}">

                                <td th:text="${stat.count}"></td>

                                <td th:text="${budget.title}"></td>

                                <td th:text="${budget.month}"></td>

                                <td th:text="${budget.year}"></td>

                                <td>

                                    ₹ <span th:text="${budget.amount}"></span>

                                </td>

                                <td>

                                    <a th:href="@{'/budget/view/' + ${budget.id}}"
                                       class="btn btn-info btn-sm text-white">

                                        <i class="bi bi-eye-fill"></i>

                                    </a>

                                    <a th:href="@{'/budget/edit/' + ${budget.id}}"
                                       class="btn btn-warning btn-sm">

                                        <i class="bi bi-pencil-square"></i>

                                    </a>

                                    <a th:href="@{'/budget/delete/' + ${budget.id}}"
                                       class="btn btn-danger btn-sm"
                                       onclick="return confirm('Delete this budget?')">

                                        <i class="bi bi-trash-fill"></i>

                                    </a>

                                </td>

                            </tr>

                            </tbody>

                        </table>

                    </div>

                </div>

            </div>

        </div>

    </div>

</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.7/dist/js/bootstrap.bundle.min.js"></script>

</body>
</html>
