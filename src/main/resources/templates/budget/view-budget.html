<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">

<head>

    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title>View Budget | Smart Expense Tracker</title>

    <!-- Bootstrap CSS -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.7/dist/css/bootstrap.min.css"
          rel="stylesheet">

    <!-- Bootstrap Icons -->
    <link rel="stylesheet"
          href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.13.1/font/bootstrap-icons.min.css">

    <!-- Dashboard CSS -->
    <link rel="stylesheet" th:href="@{/css/dashboard.css}">

</head>

<body>

<div class="dashboard-container">

    <!-- Sidebar -->
    <div th:replace="~{fragments/sidebar :: sidebar}"></div>

    <div class="main-content">

        <!-- Navbar -->
        <div th:replace="~{fragments/navbar :: navbar}"></div>

        <div class="content">

            <!-- Header -->
            <div class="d-flex justify-content-between align-items-center mb-4">

                <div>

                    <h2 class="fw-bold">View Budget</h2>

                    <p class="text-muted mb-0">
                        Budget details
                    </p>

                </div>

                <a th:href="@{/budget}" class="btn btn-secondary">

                    <i class="bi bi-arrow-left"></i>

                    Back

                </a>

            </div>

            <!-- Budget Details -->

            <div class="dashboard-card">

                <div class="card-body">

                    <table class="table table-bordered">

                        <tr>
                            <th width="25%">Title</th>
                            <td th:text="${budget.title}"></td>
                        </tr>

                        <tr>
                            <th>Month</th>
                            <td th:text="${budget.month}"></td>
                        </tr>

                        <tr>
                            <th>Year</th>
                            <td th:text="${budget.year}"></td>
                        </tr>

                        <tr>
                            <th>Budget Amount</th>
                            <td>
                                ₹ <span th:text="${budget.amount}"></span>
                            </td>
                        </tr>

                        <tr>
                            <th>Created Date</th>
                            <td th:text="${budget.createdDate}"></td>
                        </tr>

                    </table>

                    <div class="mt-4">

                        <a th:href="@{'/budget/edit/' + ${budget.id}}"
                           class="btn btn-warning">

                            <i class="bi bi-pencil-square"></i>

                            Edit Budget

                        </a>

                        <a th:href="@{/budget}"
                           class="btn btn-secondary">

                            Back

                        </a>

                    </div>

                </div>

            </div>

        </div>

    </div>

</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.7/dist/js/bootstrap.bundle.min.js"></script>

</body>
</html>
