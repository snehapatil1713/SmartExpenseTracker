<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">

<head>

    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title>Edit Profile | Smart Expense Tracker</title>

    <!-- Bootstrap -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.7/dist/css/bootstrap.min.css"
          rel="stylesheet">

    <!-- Bootstrap Icons -->
    <link rel="stylesheet"
          href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.13.1/font/bootstrap-icons.min.css">

    <!-- Dashboard CSS -->
    <link rel="stylesheet"
          th:href="@{/css/dashboard.css}">

</head>

<body>

<div class="dashboard-container">

    <!-- Sidebar -->
    <div th:replace="~{fragments/sidebar :: sidebar}"></div>

    <!-- Main Content -->
    <div class="main-content">

        <!-- Navbar -->
        <div th:replace="~{fragments/navbar :: navbar}"></div>

        <div class="content">

            <div class="row justify-content-center">

                <div class="col-lg-8">

                    <div class="dashboard-card">

                        <h3 class="mb-4 text-center">
                            <i class="bi bi-pencil-square"></i>
                            Edit Profile
                        </h3>

                        <form th:action="@{/profile/update}"
                              th:object="${user}"
                              method="post"
                              enctype="multipart/form-data">

                            <!-- Profile Picture -->
                            <div class="text-center mb-4">

                                <img th:if="${user.profileImage != null}"
                                     th:src="@{'/uploads/' + ${user.profileImage}}"
                                     class="rounded-circle border"
                                     width="140"
                                     height="140"
                                     style="object-fit:cover;">

                                <i th:if="${user.profileImage == null}"
                                   class="bi bi-person-circle"
                                   style="font-size:120px;color:#0d6efd;"></i>

                                <div class="mt-3">
                                    <label class="form-label fw-bold">
                                        Profile Picture
                                    </label>

                                    <input type="file"
                                           name="profilePhoto"
                                           class="form-control"
                                           accept="image/*">
                                </div>

                            </div>

                            <!-- Full Name -->
                            <div class="mb-3">
                                <label class="form-label">Full Name</label>

                                <input type="text"
                                       class="form-control"
                                       th:field="*{fullName}"
                                       required>
                            </div>

                            <!-- Email -->
                            <div class="mb-3">
                                <label class="form-label">Email</label>

                                <input type="email"
                                       class="form-control"
                                       th:field="*{email}"
                                       readonly>
                            </div>

                            <!-- Phone -->
                            <div class="mb-3">
                                <label class="form-label">Phone</label>

                                <input type="text"
                                       class="form-control"
                                       th:field="*{phone}"
                                       required>
                            </div>

                            <!-- Date of Birth -->
                            <div class="mb-3">
                                <label class="form-label">Date of Birth</label>

                                <input type="date"
                                       class="form-control"
                                       th:field="*{dateOfBirth}">
                            </div>

                            <!-- Gender -->
                            <div class="mb-3">
                                <label class="form-label">Gender</label>

                                <select class="form-select"
                                        th:field="*{gender}">

                                    <option value="">Select Gender</option>
                                    <option value="Male">Male</option>
                                    <option value="Female">Female</option>
                                    <option value="Other">Other</option>

                                </select>
                            </div>

                            <!-- Address -->
                            <div class="mb-4">
                                <label class="form-label">Address</label>

                                <textarea class="form-control"
                                          rows="4"
                                          th:field="*{address}"></textarea>
                            </div>

                            <div class="d-flex justify-content-between">

                                <a th:href="@{/profile}"
                                   class="btn btn-secondary">

                                    <i class="bi bi-arrow-left"></i>
                                    Cancel

                                </a>

                                <button type="submit"
                                        class="btn btn-primary">

                                    <i class="bi bi-check-circle"></i>
                                    Save Changes

                                </button>

                            </div>

                        </form>

                    </div>

                </div>

            </div>

        </div>

    </div>

</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.7/dist/js/bootstrap.bundle.min.js"></script>

</body>
</html>
