<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">

<head>

    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title th:text="${pageTitle}">Settings</title>

    <!-- Bootstrap -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.7/dist/css/bootstrap.min.css"
          rel="stylesheet">

    <!-- Bootstrap Icons -->
    <link rel="stylesheet"
          href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.13.1/font/bootstrap-icons.min.css">

    <!-- Dashboard CSS -->
    <link rel="stylesheet" th:href="@{/css/dashboard.css}">

    <!-- Settings CSS -->
    <link rel="stylesheet" th:href="@{/css/settings.css}">

</head>

<body>

<div class="dashboard-container">

    <!-- Sidebar -->
    <div th:replace="~{fragments/sidebar :: sidebar}"></div>

    <!-- Main Content -->
    <div class="main-content">

        <!-- Navbar -->
        <div th:replace="~{fragments/navbar :: navbar}"></div>

        <!-- Page Content -->
        <div class="content">

            <!-- Page Header -->
            <div class="page-header mb-4">

                <h2>
                    <i class="bi bi-gear-fill text-primary"></i>
                    Account Settings
                </h2>

                <p class="text-muted">
                    Manage your account security and personal preferences.
                </p>

            </div>

            <div class="row g-4">

                <!-- Security Card -->
                <div class="col-lg-8">

                    <div class="dashboard-card">

                        <h4 class="mb-4">
                            <i class="bi bi-shield-lock-fill text-primary"></i>
                            Change Password
                        </h4>

                        <!-- Success -->
                        <div class="alert alert-success"
                             th:if="${success}"
                             th:text="${success}">
                        </div>

                        <!-- Error -->
                        <div class="alert alert-danger"
                             th:if="${error}"
                             th:text="${error}">
                        </div>

                        <form th:action="@{/settings/change-password}"
                              method="post">

                            <div class="mb-3">

                                <label class="form-label">
                                    Current Password
                                </label>

                                <input type="password"
                                       name="currentPassword"
                                       class="form-control"
                                       required>

                            </div>

                            <div class="mb-3">

                                <label class="form-label">
                                    New Password
                                </label>

                                <input type="password"
                                       id="newPassword"
                                       name="newPassword"
                                       class="form-control"
                                       required
                                       onkeyup="checkStrength()">

                                <small id="strengthText"
                                       class="text-muted">
                                    Password Strength
                                </small>

                            </div>

                            <div class="mb-4">

                                <label class="form-label">
                                    Confirm Password
                                </label>

                                <input type="password"
                                       name="confirmPassword"
                                       class="form-control"
                                       required>

                            </div>

                            <button class="btn btn-primary btn-lg">

                                <i class="bi bi-key-fill"></i>

                                Update Password

                            </button>

                        </form>

                    </div>

                </div>

                <!-- Right Panel -->
                <div class="col-lg-4">

                    <!-- Account Info -->
                    <div class="dashboard-card mb-4">

                        <h5 class="mb-3">

                            <i class="bi bi-person-circle text-primary"></i>

                            Account Information

                        </h5>

                        <table class="table table-borderless">

                            <tr>
							    <th>Name</th>
							    <td th:text="${user.fullName}">
							        Full Name
							    </td>
							</tr>
							
							<tr>
							    <th>Email</th>
							    <td th:text="${user.email}">
							        Email
							    </td>
							</tr>
							
                        </table>

                    </div>

                </div>

            </div>

        </div>

    </div>

</div>

<script>

function checkStrength(){

    let password=document.getElementById("newPassword").value;
    let text=document.getElementById("strengthText");

    if(password.length<6){

        text.innerHTML="Weak Password";
        text.className="text-danger";

    }
    else if(password.length<10){

        text.innerHTML="Medium Password";
        text.className="text-warning";

    }
    else{

        text.innerHTML="Strong Password";
        text.className="text-success";

    }

}

</script>

</body>

</html>
