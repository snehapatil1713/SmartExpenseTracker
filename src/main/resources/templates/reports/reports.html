<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">

<head>

    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title>Reports | Smart Expense Tracker</title>

    <!-- Bootstrap CSS -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.7/dist/css/bootstrap.min.css"
          rel="stylesheet">

    <!-- Bootstrap Icons -->
    <link rel="stylesheet"
          href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.13.1/font/bootstrap-icons.min.css">
          
          <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

    <!-- Dashboard CSS -->
    <link rel="stylesheet"
          th:href="@{/css/dashboard.css}">

</head>

<body>

<div class="dashboard-container">

    <!-- Sidebar -->
    <div th:replace="~{fragments/sidebar :: sidebar}"></div>

    <!-- Main Content -->
    <div class="main-content">

        <!-- Navbar -->
        <div th:replace="~{fragments/navbar :: navbar}"></div>

        <div class="content">

            <!-- Header -->
            <div class="mb-4">

                <h2 class="fw-bold">
                    <i class="bi bi-file-earmark-bar-graph-fill text-primary"></i>
                    Monthly Financial Report
                </h2>

                <p class="text-muted">
                    View your monthly financial summary.
                </p>

            </div>

            <!-- First Row -->

            <div class="row">

                <div class="col-md-3 mb-4">

                    <div class="summary-card income-card">

                        <div class="card-icon">
                            <i class="bi bi-wallet2"></i>
                        </div>

                        <div class="card-content">
                            <h6>Total Income</h6>

                            <h3>
                                ₹<span th:text="${#numbers.formatDecimal(report.totalIncome,1,2)}"></span>
                            </h3>

                        </div>

                    </div>

                </div>

                <div class="col-md-3 mb-4">

                    <div class="summary-card expense-card">

                        <div class="card-icon">
                            <i class="bi bi-cash-stack"></i>
                        </div>

                        <div class="card-content">
                            <h6>Total Expense</h6>

                            <h3>
                                ₹<span th:text="${#numbers.formatDecimal(report.totalExpense,1,2)}"></span>
                            </h3>

                        </div>

                    </div>

                </div>

                <div class="col-md-3 mb-4">

                    <div class="summary-card balance-card">

                        <div class="card-icon">
                            <i class="bi bi-piggy-bank-fill"></i>
                        </div>

                        <div class="card-content">
                            <h6>Net Savings</h6>

                            <h3>
                                ₹<span th:text="${#numbers.formatDecimal(report.savings,1,2)}"></span>
                            </h3>

                        </div>

                    </div>

                </div>

                <div class="col-md-3 mb-4">

                    <div class="summary-card budget-card">

                        <div class="card-icon">
                            <i class="bi bi-bullseye"></i>
                        </div>

                        <div class="card-content">
                            <h6>Budget</h6>

                            <h3>
                                ₹<span th:text="${#numbers.formatDecimal(report.budget,1,2)}"></span>
                            </h3>

                        </div>

                    </div>

                </div>

            </div>

            <!-- Second Row -->

            <div class="row">

                <div class="col-md-3 mb-4">

                    <div class="summary-card">

                        <div class="card-icon bg-danger">
                            <i class="bi bi-cash-coin"></i>
                        </div>

                        <div class="card-content">

                            <h6>
                                <span th:text="${report.remainingBudget >= 0 ? 'Remaining Budget' : 'Overspent By'}"></span>
                            </h6>

                            <h3 th:classappend="${report.remainingBudget >= 0} ? ' text-success' : ' text-danger'">

                                ₹<span th:text="${#numbers.formatDecimal(T(java.lang.Math).abs(report.remainingBudget),1,2)}"></span>

                            </h3>

                        </div>

                    </div>

                </div>

                <div class="col-md-3 mb-4">

                    <div class="summary-card">

                        <div class="card-icon bg-warning">
                            <i class="bi bi-speedometer2"></i>
                        </div>

                        <div class="card-content">

                            <h6>Budget Usage</h6>

                            <h3>

                                <span th:text="${#numbers.formatDecimal(report.budgetUsage,1,0)}"></span>%

                            </h3>

                        </div>

                    </div>

                </div>

                <div class="col-md-3 mb-4">

                    <div class="summary-card">

                        <div class="card-icon bg-success">
                            <i class="bi bi-graph-up-arrow"></i>
                        </div>

                        <div class="card-content">

                            <h6>Savings Rate</h6>

                            <h3>

                                <span th:text="${#numbers.formatDecimal(report.savingsRate,1,1)}"></span>%

                            </h3>

                        </div>

                    </div>

                </div>

                <div class="col-md-3 mb-4">

                    <div class="summary-card">

                        <div class="card-icon bg-info">
                            <i class="bi bi-trophy-fill"></i>
                        </div>

                        <div class="card-content">

                            <h6>Highest Category</h6>

                            <h5 th:text="${report.highestCategory}"></h5>

                        </div>

                    </div>

                </div>

            </div>
            
			            <!-- Budget Analysis -->
			<div class="dashboard-card mt-4">
			
			    <div class="d-flex justify-content-between align-items-center mb-4">
			        <h4 class="fw-bold mb-0">
			            <i class="bi bi-bar-chart-line-fill text-primary"></i>
			            Budget Analysis
			        </h4>
			
			        <span class="badge fs-6 px-3 py-2"
			              th:classappend="${report.budgetUsage < 80} ? ' bg-success'
			                             : (${report.budgetUsage <= 100} ? ' bg-warning text-dark'
			                             : ' bg-danger')"
			              th:text="${report.budgetUsage < 80} ? 'On Track'
			                       : (${report.budgetUsage <= 100} ? 'Near Limit'
			                       : 'Budget Exceeded')">
			        </span>
			    </div>
			
			    <div class="mb-2 d-flex justify-content-between">
			        <span class="fw-semibold">Budget Usage</span>
			
			        <span class="fw-bold">
			            <span th:text="${#numbers.formatDecimal(report.budgetUsage,1,0)}"></span>%
			        </span>
			    </div>
			
			    <div class="progress" style="height:22px; border-radius:12px;">
			
			        <div class="progress-bar progress-bar-striped progress-bar-animated"
			
			             th:style="'width:' + (${report.budgetUsage > 100 ? 100 : report.budgetUsage}) + '%;'"
			
			             th:classappend="${report.budgetUsage < 80} ? ' bg-success'
			                            : (${report.budgetUsage <= 100} ? ' bg-warning'
			                            : ' bg-danger')">
			
			        </div>
			
			    </div>
			
			    <hr class="my-4">
			
			    <div class="row text-center">
			
			        <div class="col-md-4">
			
			            <h6 class="text-muted">Budget</h6>
			
			            <h4 class="fw-bold text-primary">
			                ₹<span th:text="${#numbers.formatDecimal(report.budget,1,2)}"></span>
			            </h4>
			
			        </div>
			
			        <div class="col-md-4">
			
			            <h6 class="text-muted">Expense</h6>
			
			            <h4 class="fw-bold text-danger">
			                ₹<span th:text="${#numbers.formatDecimal(report.totalExpense,1,2)}"></span>
			            </h4>
			
			        </div>
			
			        <div class="col-md-4">
			
			            <h6 class="text-muted">Remaining</h6>
			
			            <h4 th:classappend="${report.remainingBudget>=0} ? ' text-success' : ' text-danger'">
			
			                ₹<span th:text="${#numbers.formatDecimal(T(java.lang.Math).abs(report.remainingBudget),1,2)}"></span>
			
			            </h4>
			
			        </div>
			
			    </div>
			
			</div>
			
			<!-- Charts -->
			<div class="row mt-4">
			
			    <!-- Income vs Expense -->
			    <div class="col-lg-8 mb-4">
			
			        <div class="dashboard-card">
			
			            <h4 class="fw-bold mb-4">
			                <i class="bi bi-bar-chart-fill text-primary"></i>
			                Monthly Income vs Expense
			            </h4>
			
			            <canvas id="incomeExpenseChart" height="120"></canvas>
			
			        </div>
			
			    </div>
			
			    <!-- Expense Category -->
			    <div class="col-lg-4 mb-4">
			
			        <div class="dashboard-card">
			
			            <h4 class="fw-bold mb-4">
			                <i class="bi bi-pie-chart-fill text-success"></i>
			                Expense Categories
			            </h4>
			
			            <canvas id="expenseCategoryChart"></canvas>
			
			        </div>
			
			    </div>
			
			</div>

        </div>

    </div>

</div>

<script th:inline="javascript">

/* ---------- Data from Controller ---------- */

const incomeData = /*[[${incomeChart}]]*/ {};
const expenseData = /*[[${expenseChart}]]*/ {};
const categoryData = /*[[${categoryChart}]]*/ {};

/* ---------- Bar Chart ---------- */

new Chart(document.getElementById("incomeExpenseChart"), {

    type: 'bar',

    data: {

        labels: Object.keys(incomeData),

        datasets: [

            {
                label: 'Income',

                data: Object.values(incomeData),

                backgroundColor: '#198754'
            },

            {
                label: 'Expense',

                data: Object.values(expenseData),

                backgroundColor: '#dc3545'
            }

        ]
    },

    options: {

        responsive: true,

        plugins: {

            legend: {

                position: 'top'

            }

        }

    }

});

/* ---------- Pie Chart ---------- */

new Chart(document.getElementById("expenseCategoryChart"), {

    type: 'pie',

    data: {

        labels: Object.keys(categoryData),

        datasets: [

            {

                data: Object.values(categoryData),

                backgroundColor: [

                    '#0d6efd',
                    '#198754',
                    '#ffc107',
                    '#dc3545',
                    '#6f42c1',
                    '#fd7e14',
                    '#20c997',
                    '#6610f2'

                ]

            }

        ]

    },

    options: {

        responsive: true,

        plugins: {

            legend: {

                position: 'bottom'

            }

        }

    }

});

</script>


<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.7/dist/js/bootstrap.bundle.min.js"></script>

</body>

</html>
