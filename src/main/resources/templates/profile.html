<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">

<head>

    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title>My Profile | Smart Expense Tracker</title>

    <!-- Bootstrap -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.7/dist/css/bootstrap.min.css"
          rel="stylesheet">

    <!-- Bootstrap Icons -->
    <link rel="stylesheet"
          href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.13.1/font/bootstrap-icons.min.css">

    <!-- Dashboard CSS -->
    <link rel="stylesheet"
          th:href="@{/css/dashboard.css}">

    <!-- Profile CSS -->
    <link rel="stylesheet"
          th:href="@{/css/profile.css}">

</head>

<body>

<div class="dashboard-container">

    <!-- Sidebar -->
    <div th:replace="~{fragments/sidebar :: sidebar}"></div>

    <!-- Main Content -->
    <div class="main-content">

        <!-- Navbar -->
        <div th:replace="~{fragments/navbar :: navbar}"></div>

        <div class="content">

            <div class="row justify-content-center">

                <div class="col-lg-9">

                    <div class="profile-card">

                        <!-- ================= HEADER ================= -->

                        <div class="profile-header">

                            <img th:if="${user.profileImage != null}"
                                 th:src="@{'/uploads/' + ${user.profileImage}}"
                                 class="profile-image">

                            <i th:if="${user.profileImage == null}"
                               class="bi bi-person-circle profile-default"></i>

                            <h2 class="profile-name">

                                <span th:text="${user.fullName}"></span>

                                <span class="verified-badge">
                                    <i class="bi bi-check-lg"></i>
                                </span>

                            </h2>

                            <div class="profile-role">
                                Smart Expense Tracker User
                            </div>

                        </div>

                        <!-- ================= BODY ================= -->

                        <div class="profile-body">

                            <!-- Full Name -->

                            <div class="info-card">

                                <div class="row align-items-center">

                                    <div class="col-auto">

                                        <div class="info-icon">
                                            <i class="bi bi-person-fill"></i>
                                        </div>

                                    </div>

                                    <div class="col">

                                        <div class="info-title">
                                            Full Name
                                        </div>

                                        <div class="info-value"
                                             th:text="${user.fullName}">
                                        </div>

                                    </div>

                                </div>

                            </div>

                            <!-- Email -->

                            <div class="info-card">

                                <div class="row align-items-center">

                                    <div class="col-auto">

                                        <div class="info-icon">
                                            <i class="bi bi-envelope-fill"></i>
                                        </div>

                                    </div>

                                    <div class="col">

                                        <div class="info-title">
                                            Email Address
                                        </div>

                                        <div class="info-value"
                                             th:text="${user.email}">
                                        </div>

                                    </div>

                                </div>

                            </div>

                            <!-- Phone -->

                            <div class="info-card">

                                <div class="row align-items-center">

                                    <div class="col-auto">

                                        <div class="info-icon">
                                            <i class="bi bi-telephone-fill"></i>
                                        </div>

                                    </div>

                                    <div class="col">

                                        <div class="info-title">
                                            Phone Number
                                        </div>

                                        <div class="info-value"
                                             th:text="${user.phone}">
                                        </div>

                                    </div>

                                </div>

                            </div>

                            <!-- Gender -->

                            <div class="info-card">

                                <div class="row align-items-center">

                                    <div class="col-auto">

                                        <div class="info-icon">
                                            <i class="bi bi-gender-ambiguous"></i>
                                        </div>

                                    </div>

                                    <div class="col">

                                        <div class="info-title">
                                            Gender
                                        </div>

                                        <div class="info-value"
                                             th:text="${user.gender} ?: 'Not Available'">
                                        </div>

                                    </div>

                                </div>

                            </div>

                            <!-- DOB -->

                            <div class="info-card">

                                <div class="row align-items-center">

                                    <div class="col-auto">

                                        <div class="info-icon">
                                            <i class="bi bi-calendar-heart-fill"></i>
                                        </div>

                                    </div>

                                    <div class="col">

                                        <div class="info-title">
                                            Date of Birth
                                        </div>

                                        <div class="info-value"
                                             th:text="${user.dateOfBirth} ?: 'Not Available'">
                                        </div>

                                    </div>

                                </div>

                            </div>

                            <!-- Address -->

                            <div class="info-card">

                                <div class="row align-items-center">

                                    <div class="col-auto">

                                        <div class="info-icon">
                                            <i class="bi bi-geo-alt-fill"></i>
                                        </div>

                                    </div>

                                    <div class="col">

                                        <div class="info-title">
                                            Address
                                        </div>

                                        <div class="info-value"
                                             th:text="${user.address} ?: 'Not Available'">
                                        </div>

                                    </div>

                                </div>

                            </div>

                            <!-- Member Since -->

                            <div class="info-card">

                                <div class="row align-items-center">

                                    <div class="col-auto">

                                        <div class="info-icon">
                                            <i class="bi bi-award-fill"></i>
                                        </div>

                                    </div>

                                    <div class="col">

                                        <div class="info-title">
                                            Member Since
                                        </div>

                                        <div class="info-value"
                                             th:text="${#temporals.format(user.createdAt,'dd MMM yyyy')}">
                                        </div>

                                    </div>

                                </div>

                            </div>

                            <div class="text-center mt-5">

                                <a th:href="@{/profile/edit}"
                                   class="btn profile-btn">

                                    <i class="bi bi-pencil-square"></i>

                                    Edit Profile

                                </a>

                            </div>

                        </div>

                    </div>

                </div>

            </div>

        </div>

    </div>

</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.7/dist/js/bootstrap.bundle.min.js"></script>

</body>
</html>
