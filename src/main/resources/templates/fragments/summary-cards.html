<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">

<body>

<div th:fragment="summaryCards">

    <div class="row g-4 mt-3">

        <!-- Total Income -->
        <div class="col-lg-3 col-md-6">

            <div class="summary-card income-card">

                <div class="card-icon">
                    <i class="bi bi-cash-stack"></i>
                </div>

                <div class="card-content">

                    <h6>Total Income</h6>

                    <h3 th:text="'₹' + ${#numbers.formatDecimal(totalIncome,1,2)}">
                        ₹0.00
                    </h3>

                    <small class="text-success">
                        <i class="bi bi-arrow-up"></i>
                        This Month:
                        <span th:text="'₹' + ${#numbers.formatDecimal(monthlyIncome,1,2)}">
                            ₹0.00
                        </span>
                    </small>

                </div>

            </div>

        </div>

        <!-- Total Expense -->
        <div class="col-lg-3 col-md-6">

            <div class="summary-card expense-card">

                <div class="card-icon">
                    <i class="bi bi-wallet2"></i>
                </div>

                <div class="card-content">

                    <h6>Total Expense</h6>

                    <h3 th:text="'₹' + ${#numbers.formatDecimal(totalExpense,1,2)}">
                        ₹0.00
                    </h3>

                    <small class="text-danger">
                        <i class="bi bi-arrow-up"></i>
                        This Month:
                        <span th:text="'₹' + ${#numbers.formatDecimal(monthlyExpense,1,2)}">
                            ₹0.00
                        </span>
                    </small>

                </div>

            </div>

        </div>

        <!-- Current Balance -->
        <div class="col-lg-3 col-md-6">

            <div class="summary-card balance-card">

                <div class="card-icon">
                    <i class="bi bi-bank"></i>
                </div>

                <div class="card-content">

                    <h6>Current Balance</h6>

                    <h3 th:text="'₹' + ${#numbers.formatDecimal(currentBalance,1,2)}">
                        ₹0.00
                    </h3>

                    <small class="text-primary">
                        Available Balance
                    </small>

                </div>

            </div>

        </div>

        <!-- Savings Rate -->
        <div class="col-lg-3 col-md-6">

            <div class="summary-card budget-card">

                <div class="card-icon">
                    <i class="bi bi-piggy-bank"></i>
                </div>

                <div class="card-content">

                    <h6>This Month Savings</h6>

                    <h3 th:text="'₹' + ${#numbers.formatDecimal(monthlyIncome - monthlyExpense,1,2)}">
                        ₹0.00
                    </h3>

                    <small class="text-warning">
                        Monthly Savings
                    </small>

                </div>

            </div>

        </div>

    </div>

</div>

</body>
</html>
