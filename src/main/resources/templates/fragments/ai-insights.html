<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">

<body>

<div th:fragment="aiInsights">

    <div class="dashboard-card mt-4">

        <div class="d-flex justify-content-between align-items-center mb-4">

            <h4 class="fw-bold mb-0">
                <i class="bi bi-robot text-primary"></i>
                AI Insights
            </h4>

            <span class="badge bg-primary">
                AI Powered
            </span>

        </div>

        <div th:if="${#lists.isEmpty(aiInsights)}"
             class="alert alert-secondary">

            No insights available.

        </div>

        <div th:each="insight : ${aiInsights}"
             th:class="'alert alert-' + ${insight.alertType} + ' mb-3'">

            <h6 class="fw-bold"
                th:text="${insight.title}">
                Title
            </h6>

            <p class="mb-0"
               th:text="${insight.message}">
                Message
            </p>

        </div>

    </div>

</div>

</body>
</html>
