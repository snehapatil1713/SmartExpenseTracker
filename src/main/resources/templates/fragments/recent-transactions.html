<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">

<body>

<div th:fragment="recentTransactions">

    <div class="dashboard-card mt-4">

        <div class="d-flex justify-content-between align-items-center mb-4">

    <h4 class="fw-bold mb-0">
        Recent Transactions
    </h4>

    <div class="d-flex gap-2">

        <a th:href="@{/income}" class="btn btn-success btn-sm">
            <i class="bi bi-cash-stack"></i>
            Income
        </a>

        <a th:href="@{/expense}" class="btn btn-primary btn-sm">
            <i class="bi bi-wallet2"></i>
            Expense
        </a>

    </div>

</div>

        <div class="table-responsive">

            <table class="table table-hover align-middle">

                <thead>

                <tr>

                    <th>Type</th>
                    <th>Title</th>
                    <th>Category / Source</th>
                    <th>Date</th>
                    <th class="text-end">Amount</th>

                </tr>

                </thead>

                <tbody>

                <tr th:if="${#lists.isEmpty(recentTransactions)}">

                    <td colspan="5" class="text-center text-muted py-4">
                        No recent transactions found.
                    </td>

                </tr>

                <tr th:each="transaction : ${recentTransactions}">

                    <!-- Type -->
                    <td>

                        <span th:if="${transaction.type == 'Income'}"
                              class="badge bg-success">

                            <i class="bi bi-arrow-down-circle-fill"></i>
                            Income

                        </span>

                        <span th:if="${transaction.type == 'Expense'}"
                              class="badge bg-danger">

                            <i class="bi bi-arrow-up-circle-fill"></i>
                            Expense

                        </span>

                    </td>

                    <!-- Title -->
                    <td>

                        <strong th:text="${transaction.title}">
                            Title
                        </strong>

                    </td>

                    <!-- Category -->
                    <td th:text="${transaction.category}">
                        Category
                    </td>

                    <!-- Date -->
                    <td th:text="${#temporals.format(transaction.date,'dd MMM yyyy')}">
                        20 Jul 2026
                    </td>

                    <!-- Amount -->
                    <td class="text-end fw-bold">

                        <span th:if="${transaction.type == 'Income'}"
                              class="text-success"
                              th:text="'+ ₹' + ${#numbers.formatDecimal(transaction.amount,1,2)}">
                        </span>

                        <span th:if="${transaction.type == 'Expense'}"
                              class="text-danger"
                              th:text="'- ₹' + ${#numbers.formatDecimal(transaction.amount,1,2)}">
                        </span>

                    </td>

                </tr>

                </tbody>

            </table>

        </div>

    </div>

</div>

</body>
</html>
